<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Despesas - Sítio São Marcos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('/static/fundo.jpg'); background-size: cover; min-height: 100vh; color: white; padding: 20px; }
        .glass-panel { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 15px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .filter-bar { background: rgba(0,0,0,0.3); border-radius: 10px; padding: 15px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="glass-panel">
            <div class="d-flex justify-content-between mb-4">
                <h3><i class="fas fa-search-dollar me-2 text-info"></i>Relatório de Despesas</h3>
                <a href="/relatorios" class="btn btn-sm btn-outline-light">Voltar ao Hub</a>
            </div>

            <form class="filter-bar row g-2" method="GET">
                <div class="col-md-3">
                    <label class="small text-white-50">DE:</label>
                    <input type="date" name="inicio" class="form-control form-control-sm">
                </div>
                <div class="col-md-3">
                    <label class="small text-white-50">ATÉ:</label>
                    <input type="date" name="fim" class="form-control form-control-sm">
                </div>
                <div class="col-md-3">
                    <label class="small text-white-50">CATEGORIA:</label>
                    <select name="categoria" class="form-select form-select-sm">
                        <option value="">Todas</option>
                        <option value="Fixo">Gastos Fixos</option>
                        <option value="Insumo">Insumos</option>
                        <option value="Manutencao">Manutenção</option>
                    </select>
                </div>
                <div class="col-md-3 d-flex align-items-end">
                    <button type="submit" class="btn btn-info btn-sm w-100 fw-bold">FILTRAR DADOS</button>
                </div>
            </form>

            <div class="table-responsive">
                <table class="table table-dark table-hover align-middle">
                    <thead>
                        <tr class="text-info small text-uppercase">
                            <th>Data</th><th>Categoria</th><th>Descrição</th><th class="text-end">Valor</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for d in despesas %}
                        <tr>
                            <td>{{ d['data'] }}</td>
                            <td><span class="badge bg-secondary">{{ d['categoria'] }}</span></td>
                            <td>{{ d['descricao'] }}</td>
                            <td class="text-end fw-bold">R$ {{ d['valor_total'] }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
