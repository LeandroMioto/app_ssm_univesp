<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RH - Sítio São Marcos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('/static/fundo.jpg'); background-size: cover; background-position: center; min-height: 100vh; color: white; padding: 20px; }
        .glass-panel { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 15px; padding: 25px; border: 1px solid rgba(255,255,255,0.2); }
        .table { color: white; }
    </style>
</head>
<body>
    <div class="container"><div class="glass-panel">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Histórico de RH</h2>
            <a href="/" class="btn btn-outline-light btn-sm">Menu Principal</a>
        </div>
        <div class="table-responsive">
            <table class="table table-hover">
                <thead class="table-dark">
                    <tr><th>Data</th><th>Nome</th><th>Valor</th><th>Ações</th></tr>
                </thead>
                <tbody>
                    {% for f in pessoal %}
                    <tr>
                        <td>{{ f['data'] }}</td>
                        <td>{{ f['nome_funcionario'] }}</td>
                        <td>R$ {{ f['valor_pago'] }}</td>
                        <td><a href="/gerar_recibo/{{ f['id'] }}" class="btn btn-warning btn-sm">📄 Recibo</a></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div></div>
</body>
</html>
