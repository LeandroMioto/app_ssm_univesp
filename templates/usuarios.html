<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Usuários - Sítio São Marcos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('/static/fundo.jpg'); background-size: cover; background-position: center; min-height: 100vh; color: white; padding: 20px; }
        .glass-panel { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 15px; padding: 25px; border: 1px solid rgba(255,255,255,0.2); }
        .form-control, .form-select { background: rgba(255,255,255,0.9); border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container"><div class="glass-panel shadow">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-users-cog me-2"></i>Gestão de Usuários</h2>
            <a href="/" class="btn btn-outline-light btn-sm">Voltar</a>
        </div>

        <form method="POST" class="row g-3 mb-5 p-3 rounded" style="background: rgba(0,0,0,0.2);">
            <div class="col-md-3">
                <input type="text" name="novo_user" class="form-control" placeholder="Login" required>
            </div>
            <div class="col-md-3">
                <input type="password" name="nova_senha" class="form-control" placeholder="Senha" required>
            </div>
            <div class="col-md-3">
                <select name="novo_nivel" class="form-select">
                    <option value="operador">Operador</option>
                    <option value="admin">Administrador</option>
                </select>
            </div>
            <div class="col-md-3">
                <button type="submit" class="btn btn-warning w-100 fw-bold">CRIAR USUÁRIO</button>
            </div>
        </form>

        <table class="table table-hover text-white">
            <thead><tr><th>Usuário</th><th>Nível</th></tr></thead>
            <tbody>
                {% for u in usuarios %}
                <tr><td>{{ u['usuario'] }}</td><td><span class="badge bg-secondary">{{ u['nivel'] }}</span></td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div></div>
</body>
</html>
