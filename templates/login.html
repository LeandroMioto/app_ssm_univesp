<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sítio São Marcos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('/static/fundo.jpg'); background-size: cover; background-position: center; display: flex; align-items: center; min-height: 100vh; color: white; }
        .login-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 20px; padding: 40px; border: 1px solid rgba(255,255,255,0.2); width: 100%; max-width: 400px; margin: auto; }
        .form-control { background: rgba(255,255,255,0.9); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <img src="/static/logo.png" style="max-width: 100px;" class="mb-3">
        <h3>Acesso Restrito</h3>
        <p class="text-light small">Sítio São Marcos</p>
        
        {% if erro %}
            <div class="alert alert-danger py-2 small">{{ erro }}</div>
        {% endif %}

        <form method="POST">
            <div class="mb-3 text-start">
                <label class="form-label">Usuário</label>
                <input type="text" name="usuario" class="form-control" required>
            </div>
            <div class="mb-3 text-start">
                <label class="form-label">Senha</label>
                <input type="password" name="senha" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-success w-100 fw-bold py-2">Entrar no Sistema</button>
        </form>
    </div>
</body>
</html>
