<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendas - Sítio São Marcos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('/static/fundo.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            min-height: 100vh; color: white; display: flex; align-items: center;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 25px; border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .form-control { background: rgba(255, 255, 255, 0.9); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 500px;">
        <div class="glass-card">
            <div class="text-center mb-4">
                <img src="/static/logo.png" style="max-width: 80px;">
                <h3 class="mt-2">Registrar Venda</h3>
            </div>

            {% if mensagem %}
                <div class="alert alert-success py-2 text-center">{{ mensagem }}</div>
            {% endif %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Data da Venda</label>
                    <input type="date" name="data_venda" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Variedade do Café</label>
                    <input type="text" name="variedade" class="form-control" placeholder="Ex: Arábica" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Quantidade</label>
                    <input type="number" name="quantidade" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Valor Total (R$)</label>
                    <input type="number" step="0.01" name="valor_total" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-success w-100 fw-bold">Salvar Lançamento</button>
                <a href="/" class="btn btn-link w-100 text-white mt-2">Voltar ao Menu</a>
            </form>
        </div>
    </div>
</body>
</html>
