<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pecuária - Sítio São Marcos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('/static/fundo.jpg'); background-size: cover; background-position: center; background-attachment: fixed; min-height: 100vh; color: white; display: flex; align-items: center; }
        .glass-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; border: 1px solid rgba(255,255,255,0.2); }
        .form-control, .form-select { background: rgba(255,255,255,0.9); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 500px;">
        <div class="glass-card">
            <div class="text-center mb-4"><img src="/static/logo.png" style="max-width: 70px;"><h3>Gestão de Gado</h3></div>
            {% if mensagem %}<div class="alert alert-success py-2 text-center">{{ mensagem }}</div>{% endif %}
            <form method="POST">
                <div class="mb-3"><label class="form-label">Data</label><input type="date" name="data" class="form-control" required></div>
                <div class="mb-3">
                    <label class="form-label">Movimentação</label>
                    <select name="tipo_movimento" class="form-select" required>
                        <option value="Compra">Compra</option><option value="Venda">Venda</option><option value="Pesagem">Pesagem</option><option value="Morte">Morte</option>
                    </select>
                </div>
                <div class="row"><div class="col-6 mb-3"><label class="form-label">Cabeças</label><input type="number" name="quantidade_cabecas" class="form-control" required></div>
                <div class="col-6 mb-3"><label class="form-label">Arroba</label><input type="number" step="0.01" name="arroba_dia" class="form-control"></div></div>
                <div class="mb-3"><label class="form-label">Valor Total</label><input type="number" step="0.01" name="valor_total" class="form-control"></div>
                <button type="submit" class="btn btn-dark w-100 fw-bold" style="background-color: #5d4037; border:none;">Salvar Gado</button>
                <a href="/" class="btn btn-link w-100 text-white mt-2">Voltar</a>
            </form>
        </div>
    </div>
</body>
</html>
