<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sítio São Marcos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('/static/fundo.jpg'); background-size: cover; background-position: center; background-attachment: fixed; min-height: 100vh; color: white; display: flex; align-items: center; justify-content: center; }
        .card-menu { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); border-radius: 20px; padding: 40px; border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 8px 32px rgba(0,0,0,0.5); position: relative; }
        .user-badge { position: absolute; top: 15px; right: 20px; background: rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 30px; font-size: 0.85rem; }
        .btn-custom { margin-bottom: 12px; border-radius: 12px; font-weight: bold; transition: 0.3s; }
    </style>
</head>
<body>
    <div class="container text-center card-menu" style="max-width: 650px;">
        <div class="user-badge">
            <i class="fas fa-user-circle"></i> {{ session['usuario'] }} 
            <a href="/logout" class="text-warning ms-3 text-decoration-none fw-bold">Sair</a>
        </div>
        <img src="/static/logo.png" style="max-width: 100px;" class="mb-3">
        <h2>Sítio São Marcos</h2>
        <div class="row g-3 mt-3">
            <div class="col-{% if session['nivel'] == 'admin' %}6{% else %}12{% endif %}">
                <h6 class="text-info fw-bold">LANÇAMENTOS</h6>
                <a href="/vendas" class="btn btn-light w-100 btn-custom">Café</a>
                <a href="/despesas" class="btn btn-light w-100 btn-custom">Despesas</a>
                <a href="/pecuaria" class="btn btn-light w-100 btn-custom">Pecuária</a>
                <a href="/pessoal" class="btn btn-light w-100 btn-custom">Pessoal</a>
            </div>
            {% if session['nivel'] == 'admin' %}
            <div class="col-6 border-start border-white-50">
                <h6 class="text-warning fw-bold">RELATÓRIOS (ADMIN)</h6>
                <a href="/relatorios" class="btn btn-outline-light w-100 btn-custom">📊 Dashboard</a>
                <a href="/usuarios" class="btn btn-outline-warning w-100 btn-custom">👤 Usuários</a>
            </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
